<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f4f6f9;
      color: #222;
    }

    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 768px) {
      .row {
        grid-template-columns: 1fr;
      }
    }

    input, textarea, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #1d4ed8;
    }

    .btn-danger {
      background: #dc2626;
    }

    .btn-danger:hover {
      background: #b91c1c;
    }

    .btn-secondary {
      background: #374151;
    }

    .btn-secondary:hover {
      background: #1f2937;
    }

    .hidden {
      display: none;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .task {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 15px;
      margin-top: 15px;
      background: #fafafa;
    }

    .task h3 {
      margin-bottom: 8px;
    }

    .task p {
      margin: 6px 0;
    }

    .task-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    @media (max-width: 768px) {
      .task-actions {
        grid-template-columns: 1fr;
      }
    }

    .status {
      font-weight: bold;
      text-transform: capitalize;
    }

    .message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      display: none;
    }

    .success {
      background: #dcfce7;
      color: #166534;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
    }

    .pagination {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      align-items: center;
      flex-wrap: wrap;
    }

    .small {
      font-size: 13px;
      color: #666;
    }

    .inline {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .inline > * {
      flex: 1;
      min-width: 180px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="topbar">
        <div>
          <h1>Task Manager</h1>
          <p class="small">Register, login, create tasks, update status, and delete tasks.</p>
        </div>
        <div id="userBox" class="hidden">
          <strong id="welcomeText"></strong>
          <button id="logoutBtn" class="btn-danger" style="margin-top:10px;">Logout</button>
        </div>
      </div>
    </div>

    <div id="messageBox" class="message"></div>

    <div id="authSection" class="row">
      <div class="card">
        <h2>Register</h2>
        <input type="text" id="registerUsername" placeholder="Username" />
        <input type="password" id="registerPassword" placeholder="Password" />
        <button id="registerBtn">Register</button>
      </div>

      <div class="card">
        <h2>Login</h2>
        <input type="text" id="loginUsername" placeholder="Username" />
        <input type="password" id="loginPassword" placeholder="Password" />
        <button id="loginBtn">Login</button>
      </div>
    </div>

    <div id="appSection" class="hidden">
      <div class="card">
        <h2>Create Task</h2>
        <input type="text" id="taskTitle" placeholder="Task title" />
        <textarea id="taskDescription" placeholder="Task description"></textarea>
        <button id="createTaskBtn">Create Task</button>
      </div>

      <div class="card">
        <div class="topbar">
          <h2>Your Tasks</h2>
          <div class="inline">
            <select id="statusFilter">
              <option value="">All Status</option>
              <option value="pending">Pending</option>
              <option value="in_progress">In Progress</option>
              <option value="completed">Completed</option>
            </select>
            <select id="limitFilter">
              <option value="5">5 per page</option>
              <option value="10">10 per page</option>
              <option value="20">20 per page</option>
            </select>
            <button id="refreshBtn" class="btn-secondary">Refresh</button>
          </div>
        </div>

        <div id="taskList"></div>

        <div class="pagination">
          <button id="prevPageBtn" class="btn-secondary">Previous</button>
          <span id="pageInfo">Page 1</span>
          <button id="nextPageBtn" class="btn-secondary">Next</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = './';
    let token = localStorage.getItem('task_manager_token') || '';
    let currentUser = JSON.parse(localStorage.getItem('task_manager_user') || 'null');
    let currentPage = 1;
    let totalPages = 1;

    const authSection = document.getElementById('authSection');
    const appSection = document.getElementById('appSection');
    const userBox = document.getElementById('userBox');
    const welcomeText = document.getElementById('welcomeText');
    const messageBox = document.getElementById('messageBox');
    const taskList = document.getElementById('taskList');
    const pageInfo = document.getElementById('pageInfo');

    function showMessage(text, type = 'success') {
      messageBox.textContent = text;
      messageBox.className = `message ${type}`;
      messageBox.style.display = 'block';

      setTimeout(() => {
        messageBox.style.display = 'none';
      }, 3000);
    }

    function setAuthState(loggedIn) {
      if (loggedIn) {
        authSection.classList.add('hidden');
        appSection.classList.remove('hidden');
        userBox.classList.remove('hidden');
        welcomeText.textContent = `Logged in as ${currentUser?.username || 'User'}`;
      } else {
        authSection.classList.remove('hidden');
        appSection.classList.add('hidden');
        userBox.classList.add('hidden');
      }
    }

    async function apiRequest(endpoint, method = 'GET', data = null, requiresAuth = false) {
      const headers = {
        'Content-Type': 'application/json'
      };

      if (requiresAuth && token) {
        headers['Authorization'] = `Bearer ${token}`;
      }

      const options = {
        method,
        headers
      };

      if (data) {
        options.body = JSON.stringify(data);
      }

      const response = await fetch(API_BASE + endpoint, options);
      const result = await response.json().catch(() => ({}));

      if (!response.ok) {
        throw new Error(result.error || 'Request failed');
      }

      return result;
    }

    async function registerUser() {
      const username = document.getElementById('registerUsername').value.trim();
      const password = document.getElementById('registerPassword').value.trim();

      if (!username || !password) {
        showMessage('Please enter username and password', 'error');
        return;
      }

      try {
        const result = await apiRequest('auth/register', 'POST', { username, password });
        showMessage(result.message || 'Registered successfully');

        document.getElementById('registerUsername').value = '';
        document.getElementById('registerPassword').value = '';
      } catch (error) {
        showMessage(error.message, 'error');
      }
    }

    async function loginUser() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value.trim();

      if (!username || !password) {
        showMessage('Please enter username and password', 'error');
        return;
      }

      try {
        const result = await apiRequest('auth/login', 'POST', { username, password });

        token = result.token;
        currentUser = result.user;

        localStorage.setItem('task_manager_token', token);
        localStorage.setItem('task_manager_user', JSON.stringify(currentUser));

        setAuthState(true);
        showMessage(result.message || 'Login successful');
        loadTasks();
      } catch (error) {
        showMessage(error.message, 'error');
      }
    }

    async function logoutUser() {
      try {
        if (token) {
          await apiRequest('auth/logout', 'POST', null, true);
        }
      } catch (error) {
        // ignore logout API failure and still clear local state
      }

      token = '';
      currentUser = null;
      currentPage = 1;

      localStorage.removeItem('task_manager_token');
      localStorage.removeItem('task_manager_user');

      setAuthState(false);
      taskList.innerHTML = '';
      showMessage('Logged out successfully');
    }

    async function createTask() {
      const title = document.getElementById('taskTitle').value.trim();
      const description = document.getElementById('taskDescription').value.trim();

      if (!title) {
        showMessage('Task title is required', 'error');
        return;
      }

      try {
        await apiRequest('tasks', 'POST', { title, description }, true);
        showMessage('Task created successfully');

        document.getElementById('taskTitle').value = '';
        document.getElementById('taskDescription').value = '';
        currentPage = 1;
        loadTasks();
      } catch (error) {
        showMessage(error.message, 'error');
      }
    }

    async function updateTask(id, payload) {
      try {
        await apiRequest(`tasks/${id}`, 'PUT', payload, true);
        showMessage('Task updated successfully');
        loadTasks();
      } catch (error) {
        showMessage(error.message, 'error');
      }
    }

    async function deleteTask(id) {
      if (!confirm('Are you sure you want to delete this task?')) {
        return;
      }

      try {
        await apiRequest(`tasks/${id}`, 'DELETE', null, true);
        showMessage('Task deleted successfully');
        loadTasks();
      } catch (error) {
        showMessage(error.message, 'error');
      }
    }

    async function loadTasks() {
      try {
        const status = document.getElementById('statusFilter').value;
        const limit = document.getElementById('limitFilter').value;

        const params = new URLSearchParams({
          page: currentPage,
          limit
        });

        if (status) {
          params.append('status', status);
        }

        const result = await apiRequest(`tasks?${params.toString()}`, 'GET', null, true);

        totalPages = result.pagination?.total_pages || 1;
        pageInfo.textContent = `Page ${result.pagination?.page || 1} of ${totalPages}`;

        renderTasks(result.data || []);
      } catch (error) {
        showMessage(error.message, 'error');
      }
    }

    function renderTasks(tasks) {
      if (!tasks.length) {
        taskList.innerHTML = '<p>No tasks found.</p>';
        return;
      }

      taskList.innerHTML = tasks.map(task => `
        <div class="task">
          <h3>${escapeHtml(task.title)}</h3>
          <p><strong>Description:</strong> ${escapeHtml(task.description || 'No description')}</p>
          <p><strong>Status:</strong> <span class="status">${formatStatus(task.status)}</span></p>
          <p class="small"><strong>Created:</strong> ${escapeHtml(task.created_at)}</p>
          <p class="small"><strong>Updated:</strong> ${escapeHtml(task.updated_at)}</p>

          <div class="task-actions">
            <select onchange="handleStatusChange(${task.id}, this.value)">
              <option value="pending" ${task.status === 'pending' ? 'selected' : ''}>Pending</option>
              <option value="in_progress" ${task.status === 'in_progress' ? 'selected' : ''}>In Progress</option>
              <option value="completed" ${task.status === 'completed' ? 'selected' : ''}>Completed</option>
            </select>

            <button onclick="handleEdit(${task.id}, '${escapeJs(task.title)}', '${escapeJs(task.description || '')}', '${task.status}')">
              Edit
            </button>

            <button class="btn-danger" onclick="deleteTask(${task.id})">
              Delete
            </button>
          </div>
        </div>
      `).join('');
    }

    function formatStatus(status) {
      return status.replace('_', ' ');
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeJs(str) {
      return String(str)
        .replace(/\\/g, '\\\\')
        .replace(/'/g, "\\'")
        .replace(/\n/g, '\\n')
        .replace(/\r/g, '');
    }

    async function handleStatusChange(id, value) {
      await updateTask(id, { status: value });
    }

    async function handleEdit(id, oldTitle, oldDescription, oldStatus) {
      const title = prompt('Edit title:', oldTitle);
      if (title === null) return;

      const description = prompt('Edit description:', oldDescription);
      if (description === null) return;

      await updateTask(id, {
        title,
        description,
        status: oldStatus
      });
    }

    document.getElementById('registerBtn').addEventListener('click', registerUser);
    document.getElementById('loginBtn').addEventListener('click', loginUser);
    document.getElementById('logoutBtn').addEventListener('click', logoutUser);
    document.getElementById('createTaskBtn').addEventListener('click', createTask);
    document.getElementById('refreshBtn').addEventListener('click', () => loadTasks());

    document.getElementById('statusFilter').addEventListener('change', () => {
      currentPage = 1;
      loadTasks();
    });

    document.getElementById('limitFilter').addEventListener('change', () => {
      currentPage = 1;
      loadTasks();
    });

    document.getElementById('prevPageBtn').addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage--;
        loadTasks();
      }
    });

    document.getElementById('nextPageBtn').addEventListener('click', () => {
      if (currentPage < totalPages) {
        currentPage++;
        loadTasks();
      }
    });

    window.handleStatusChange = handleStatusChange;
    window.handleEdit = handleEdit;
    window.deleteTask = deleteTask;

    if (token && currentUser) {
      setAuthState(true);
      loadTasks();
    } else {
      setAuthState(false);
    }
  </script>
</body>
</html>
